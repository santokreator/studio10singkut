<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube Firebase</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#202020;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:30px;
font-weight:bold;
color:red;
}

.search{
width:50%;
padding:12px;
border:none;
border-radius:30px;
background:#2a2a2a;
color:white;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
margin-left:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.card video{
width:100%;
height:220px;
object-fit:cover;
background:black;
}

.info{
padding:15px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-box{
background:#1b1b1b;
padding:20px;
border-radius:20px;
width:100%;
max-width:900px;
max-height:95vh;
overflow:auto;
position:relative;
}

.close{
position:absolute;
right:20px;
top:10px;
font-size:35px;
cursor:pointer;
}

input,textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
}

#player{
width:100%;
max-height:500px;
background:black;
border-radius:15px;
margin-bottom:20px;
}

.comment{
background:#2a2a2a;
padding:15px;
border-radius:10px;
margin-top:10px;
}
</style>

</head>
<body>

<div class="navbar">
<div class="logo">MyTube</div>

<input type="text" class="search" placeholder="Cari video..." onkeyup="searchVideos(this.value)">

<div>
<button class="btn" onclick="openUpload()">Upload</button>
<button class="btn" onclick="openAuth()">Login</button>
</div>
</div>

<div class="container" id="videoContainer"></div>

<div class="modal" id="uploadModal">
<div class="modal-box">
<span class="close" onclick="closeUpload()">×</span>

<h2>Upload Video</h2>

<input type="text" id="title" placeholder="Judul Video">
<textarea id="description" placeholder="Deskripsi"></textarea>
<input type="file" id="videoFile" accept="video/*">

<button class="btn" onclick="uploadVideo()">Upload Sekarang</button>

</div>
</div>

<div class="modal" id="authModal">
<div class="modal-box" style="max-width:500px">
<span class="close" onclick="closeAuth()">×</span>

<h2>Login / Register</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="registerUser()">Register</button> <button class="btn" onclick="loginUser()">Login</button>

</div>
</div>

<div class="modal" id="watchModal">
<div class="modal-box">
<span class="close" onclick="closeWatch()">×</span>

<video controls id="player"></video>

<h2 id="watchTitle"></h2>
<p id="watchDescription"></p>

<br>
<button class="btn" onclick="likeVideo()">👍 Like</button>

<br><br>

<h3>Komentar</h3>

<textarea id="commentInput" placeholder="Tulis komentar..."></textarea>

<button class="btn" onclick="sendComment()">Kirim Komentar</button>

<div id="commentList"></div>
</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js'

const firebaseConfig = {
apiKey: 'ISI_API_KEY',
authDomain: 'ISI_DOMAIN',
projectId: 'ISI_PROJECT_ID',
storageBucket: 'ISI_BUCKET',
messagingSenderId: 'ISI_SENDER_ID',
appId: 'ISI_APP_ID'
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)
const storage = getStorage(app)

let currentUser = null
let currentVideo = null
let allVideos = []

window.openUpload = () => {
if(!currentUser){
alert('Login dahulu')
return
}
uploadModal.style.display='flex'
}

window.closeUpload = () => {
uploadModal.style.display='none'
}

window.openAuth = () => {
authModal.style.display='flex'
}

window.closeAuth = () => {
authModal.style.display='none'
}

window.closeWatch = () => {
watchModal.style.display='none'
}

window.registerUser = async () => {
const email = document.getElementById('email').value
const password = document.getElementById('password').value

await createUserWithEmailAndPassword(auth,email,password)

alert('Register berhasil')
}

window.loginUser = async () => {
const email = document.getElementById('email').value
const password = document.getElementById('password').value

await signInWithEmailAndPassword(auth,email,password)

alert('Login berhasil')
authModal.style.display='none'
}

onAuthStateChanged(auth,user=>{
currentUser=user
})

window.uploadVideo = async () => {
const title = document.getElementById('title').value
const description = document.getElementById('description').value
const file = document.getElementById('videoFile').files[0]

if(!title || !file){
alert('Lengkapi data')
return
}

const storageRef = ref(storage,'videos/'+Date.now()+file.name)

await uploadBytes(storageRef,file)

const url = await getDownloadURL(storageRef)

await addDoc(collection(db,'videos'),{
title,
description,
video:url,
user:currentUser.email,
createdAt:Date.now(),
likes:0,
comments:[]
})

alert('Video berhasil diupload')
closeUpload()
loadVideos()
}

async function loadVideos(){
const q = query(collection(db,'videos'),orderBy('createdAt','desc'))
const snapshot = await getDocs(q)

videoContainer.innerHTML=''
allVideos=[]

snapshot.forEach(doc=>{
const video = doc.data()
allVideos.push(video)

const card = document.createElement('div')
card.className='card'

card.innerHTML=`
<video src="${video.video}"></video>
<div class="info">
<h3>${video.title}</h3>
<p>${video.user}</p>
</div>
`

card.onclick=()=>watchVideo(video)
videoContainer.appendChild(card)
})
}

function watchVideo(video){
currentVideo=video

player.src=video.video
watchTitle.innerText=video.title
watchDescription.innerText=video.description

commentList.innerHTML=''

if(video.comments){
video.comments.forEach(comment=>{
const div=document.createElement('div')
div.className='comment'
div.innerText=comment
commentList.appendChild(div)
})
}

watchModal.style.display='flex'
}

window.likeVideo = () => {
alert('Like berhasil')
}

window.sendComment = () => {
const text = document.getElementById('commentInput').value

if(!text)return

const div=document.createElement('div')
div.className='comment'
div.innerText=currentUser.email+': '+text
commentList.appendChild(div)

commentInput.value=''
}

window.searchVideos = (keyword) => {
const cards=document.querySelectorAll('.card')

cards.forEach((card,index)=>{
const video=allVideos[index]

if(video.title.toLowerCase().includes(keyword.toLowerCase())){
card.style.display='block'
}else{
card.style.display='none'
}
})
}

window.onclick=function(e){
if(e.target==uploadModal)closeUpload()
if(e.target==authModal)closeAuth()
if(e.target==watchModal)closeWatch()
}

loadVideos()
</script>

</body>
</html>
